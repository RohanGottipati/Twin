# Flash SFT for TechTO persona opinions (AGENTS.md 5.1).
# Flash 1.0.1 catalog has no Qwen2.5-7B; closest is Qwen3.5-9B.
# Cost gate: flash train model/sft/config.toml --cost  then human OK before submit.

model = "Qwen/Qwen3.5-9B"
algorithm = "sft"
seed = 42

[environment]
id = "acmc/persona-env"

[train]
epochs = 3
max_examples = 30000
lora_rank = 32
lora_alpha = 64

[wandb]
project = "torontwin-sft"
run_name = "persona-sft-qwen35-9b"
