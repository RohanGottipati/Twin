# Flash GRPO: free-text opinions + OpenRouter Qwen judge (backoff, parallel batches).
# 16 prompts/step x 8 rollouts. Warm-start from SFT. Cost: flash train ... --cost

model = "Qwen/Qwen3.5-9B"
algorithm = "grpo"
seed = 2262

[environment]
id = "acmc/mcq-judge-env"
pip = ["openai>=1.0.0"]
secrets = ["OPENROUTER_API_KEY", "WANDB_API_KEY"]

[train]
epochs = 1
max_examples = 4000
batch_size = 16
group_size = 8
temperature = 1.0
max_completion_tokens = 256
init_from_adapter = "flash-1784401342-0d51be72"

[wandb]
project = "torontwin-grpo"
run_name = "mcq-judge-rewritten-qs-16x8"
